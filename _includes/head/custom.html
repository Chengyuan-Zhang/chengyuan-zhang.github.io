{% include base_path %}

<!-- start custom head snippets -->

<!-- Favicons / app icons are declared in _layouts/default.html and point to /images/icon/ -->
<meta name="theme-color" content="#ffffff">

<!-- Preconnect hints for third-party origins -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://www.youtube.com">
<link rel="dns-prefetch" href="https://scholar.google.com">

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- MathJax v3 (modernized; ~2x faster, smaller, async) -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      tags: 'all'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async defer></script>

<!-- end custom head snippets -->

<!-- Web fonts: Inter (body) + Source Serif 4 (headings) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

<!-- Apply saved theme before paint to avoid flash -->
<script>
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var useDark = saved ? saved === 'dark' : prefersDark;
      if (useDark) document.documentElement.classList.add('dark-mode');
    } catch (e) {}
  })();
</script>
